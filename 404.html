<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <meta name="color-scheme" content="dark">
  <title>404 - K-BLACK</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "SF Pro Display", -apple-system, "Helvetica Neue", Arial, sans-serif;
      background: #0a0a0a; color: #e6e6e6;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; -webkit-font-smoothing: antialiased;
    }
    .card {
      text-align: center; padding: 48px 40px;
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 4px; max-width: 480px; width: 90%;
      animation: fadeIn 0.8s ease-out;
    }
    .code {
      font-size: 72px; font-weight: 200; letter-spacing: 8px;
      color: rgba(255,255,255,0.1); margin-bottom: 16px;
    }
    h1 {
      font-size: 20px; font-weight: 400; margin-bottom: 12px;
    }
    p {
      font-size: 14px; color: #888; line-height: 1.8; margin-bottom: 24px;
    }
    .btn {
      display: inline-block; padding: 12px 28px;
      font-size: 12px; letter-spacing: 2px; color: #c8c8ff;
      background: rgba(200,200,255,0.1); border: 1px solid rgba(200,200,255,0.2);
      border-radius: 4px; text-decoration: none;
      transition: all 0.3s;
    }
    .btn:hover {
      background: rgba(200,200,255,0.15); border-color: rgba(200,200,255,0.4);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="code">404</div>
    <h1>页面不存在</h1>
    <p>该页面可能已被移除或地址有误。</p>
    <a href="/" class="btn">返回首页</a>
  </div>
</body>
</html>
