<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#000000">
<meta name="color-scheme" content="dark">
<title>开发中 - K-BLACK</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"Helvetica Neue","PingFang SC",Arial,sans-serif;background:#000;color:#e6e6e6;display:flex;justify-content:center;align-items:center;min-height:100vh;-webkit-font-smoothing:antialiased}
.box{text-align:center;padding:48px 40px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);max-width:440px;width:90%;position:relative;overflow:hidden}
.box::before{content:"";position:absolute;top:0;left:0;width:100%;height:1px;background:linear-gradient(90deg,transparent,#eeb763,transparent)}
.tag{font-size:9px;letter-spacing:3px;color:#eeb763;margin-bottom:16px}
h1{font-size:20px;font-weight:400;margin-bottom:12px}
p{font-size:13px;color:#888;line-height:1.8;margin-bottom:24px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;font-size:10px;letter-spacing:2px;color:#888;background:none;border:1px solid rgba(255,255,255,.08);transition:.3s}
.btn:hover{border-color:#2096e6;color:#2096e6}
.btn svg{width:7px;height:14px;fill:none;stroke:currentColor;stroke-width:1.2}
</style>
</head>
<body>
<div class="box">
  <div class="tag">STATUS</div>
  <h1>页面开发中</h1>
  <p>该功能或页面尚未完成，敬请期待。</p>
  <a href="/" class="btn">返回首页 <svg viewBox="0 0 7 15"><polyline points="1,1 6,7.5 1,14"/></svg></a>
</div>
</body>
</html>
