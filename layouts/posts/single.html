{{ define "main" }}
{{ partial "nav.html" . }}
<div class="sec" style="min-height:calc(100vh - 56px);padding-top:80px">
  <div class="post-header">
    <a href="/posts/" class="btn" style="margin-bottom:24px;display:inline-flex">← 返回文章列表</a>
    <h1 style="font-size:28px;font-weight:400;margin-bottom:12px">{{ .Title }}</h1>
    <div class="news-date" style="margin-bottom:8px">{{ .Date.Format "2006-01-02" }}</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:24px">
      {{ range .Params.tags }}
      <span class="tag">{{ . }}</span>
      {{ end }}
    </div>
  </div>
  <div class="post-content">
    {{ .Content }}
  </div>
</div>
{{ end }}
