<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>开发中 - K-BLACK</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
      background: #0a0a0a; color: #e6e6e6;
      display: flex; justify-content: center; align-items: center; min-height: 100vh;
    }
    .box {
      text-align: center; padding: 48px 40px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4px; max-width: 440px; width: 90%;
    }
    .tag { font-size: 9px; letter-spacing: 3px; color: #555; margin-bottom: 16px; }
    h1 { font-size: 22px; font-weight: 400; margin-bottom: 12px; }
    p { font-size: 13px; color: #888; line-height: 1.8; margin-bottom: 24px; }
    .btn {
      display: inline-block; padding: 10px 24px; font-size: 11px; letter-spacing: 2px;
      color: #c8c8ff; background: rgba(200,200,255,0.1); border: 1px solid rgba(200,200,255,0.2);
      border-radius: 3px; text-decoration: none; transition: 0.3s;
    }
    .btn:hover { background: rgba(200,200,255,0.15); border-color: rgba(200,200,255,0.4); }
  </style>
</head>
<body>
  <div class="box">
    <div class="tag">STATUS</div>
    <h1>页面开发中</h1>
    <p>该功能或页面尚未完成，敬请期待。</p>
    <a href="/" class="btn">返回首页</a>
  </div>
</body>
</html>
